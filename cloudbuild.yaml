steps:
  # Step 1: Build the Docker image from ./backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/promptwars-pune-494405/learning-assistant/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/promptwars-pune-494405/learning-assistant/backend:latest'
      - './backend'

  # Step 2: Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/promptwars-pune-494405/learning-assistant/backend'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'adaptive-learning-backend'
      - '--image=us-central1-docker.pkg.dev/promptwars-pune-494405/learning-assistant/backend:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--service-account=learning-assistant-sa@promptwars-pune-494405.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=promptwars-pune-494405,GCP_LOCATION=us-central1,GEMINI_MODEL=gemini-1.5-flash-001'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--port=8080'
      - '--project=promptwars-pune-494405'

images:
  - 'us-central1-docker.pkg.dev/promptwars-pune-494405/learning-assistant/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/promptwars-pune-494405/learning-assistant/backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
